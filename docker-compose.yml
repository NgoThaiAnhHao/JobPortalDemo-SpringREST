version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: jobportal

    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: jobportaldb
      MYSQL_USER: jobportal
      MYSQL_PASSWORD: 12345

    ports:
      - '3307:3306'

    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: .
    container_name: jobportal-api

    depends_on:
      - db

    ports:
      - "8080:8080"

volumes:
  db_data: