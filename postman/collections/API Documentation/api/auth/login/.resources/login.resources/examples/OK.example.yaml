$kind: http-example
request:
  url: "{{baseUrl}}/api/auth/login"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: "*/*"
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "email": "string",
        "password": "string"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: "*/*"
  body:
    type: text
    content: |-
      {
        "accessToken": "string",
        "refreshToken": "string"
      }
order: 1000
