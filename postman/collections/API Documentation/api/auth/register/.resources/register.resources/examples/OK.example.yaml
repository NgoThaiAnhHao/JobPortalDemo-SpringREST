$kind: http-example
request:
  url: "{{baseUrl}}/api/auth/register"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "confirmPassword": "strin",
        "email": "string",
        "password": "string",
        "provider": "GOOGLE",
        "userTypeRole": "JOB_SEEKER"
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: ""
order: 1000
